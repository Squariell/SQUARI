name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: master
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: messenger-apk
          path: bin/*.apk
